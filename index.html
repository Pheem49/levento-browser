<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levento AI Browser</title>
    <link rel="icon" type="image/png" href="./assets/icon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="./assets/icon.png?v=2">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header id="toolbar" class="glass-panel drag-region">

            <div class="nav-actions no-drag">
                <button id="btn-back" title="Go Back">◀</button>
                <button id="btn-forward" title="Go Forward">▶</button>
                <button id="btn-reload" title="Reload">↻</button>
            </div>
            <div class="address-bar-container no-drag">
                <input type="text" id="address-input" placeholder="Enter URL or search...">
            </div>
            <div class="window-actions no-drag">
                <button id="btn-dev-tools" title="Toggle Developer Tools">⚙️ Inspect</button>
                <button id="sidebar-toggle"
                    style="background:linear-gradient(135deg,#3b82f6,#6366f1); border:none; color:white; border-radius:6px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; transition:all 0.2s;"
                    title="Toggle AI Panel">
                    <span id="sidebar-toggle-icon">🤖</span>
                    <span id="sidebar-toggle-label">AI</span>
                </button>
            </div>
        </header>

        <!-- Tab Bar -->
        <div id="tab-bar">
            <div id="tab-list"></div>
            <button id="btn-new-tab" title="New Tab">+</button>
        </div>

        <div id="main-content">
            <main id="browser-view">
                <div class="browser-placeholder">
                    Loading Web View...
                </div>
            </main>
            <aside id="sidebar" class="glass-panel">
                <div class="sidebar-header">
                    <!-- Row 1: Branding + Settings -->
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div
                                style="width:8px; height:8px; border-radius:50%; background:#4ade80; box-shadow:0 0 8px #4ade80; flex-shrink:0;">
                            </div>
                            <span
                                style="font-size:13px; font-weight:700; letter-spacing:0.06em; color:#e2e8f0;">LEVENTO</span>
                            <span
                                style="font-size:10px; padding:2px 7px; background:rgba(88,166,255,0.15); color:#93c5fd; border:1px solid rgba(88,166,255,0.25); border-radius:20px; letter-spacing:0.05em;">AI</span>
                        </div>
                        <button id="btn-settings"
                            style="padding:4px 8px; font-size:13px; border:none; background:rgba(255,255,255,0.06); border-radius:6px; cursor:pointer;"
                            title="Settings">⚙️</button>
                    </div>

                    <!-- Row 2: Model Card -->
                    <div
                        style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:10px 12px; margin-bottom:8px;">
                        <div
                            style="font-size:9px; color:#64748b; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px;">
                            🧠 Model</div>
                        <select id="model-select"
                            style="width:100%; background:rgba(15,15,25,0.7); color:#e2e8f0; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:7px 10px; font-size:13px; outline:none; cursor:pointer;">
                            <option value="ollama">⚡ Ollama (Local)</option>
                            <option value="gemini">✨ Gemini 2.5 Flash</option>
                        </select>
                    </div>

                    <!-- Row 3: Stats Grid -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px;">
                        <div
                            style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:8px 10px;">
                            <div
                                style="font-size:9px; color:#64748b; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px;">
                                ⚡ Response</div>
                            <div style="font-size:18px; font-weight:700; color:#4ade80; line-height:1;" id="stat-speed">
                                —</div>
                            <div style="font-size:9px; color:#475569; margin-top:2px;">seconds</div>
                        </div>
                        <div
                            style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:8px 10px;">
                            <div
                                style="font-size:9px; color:#64748b; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px;">
                                📊 Tokens</div>
                            <div style="font-size:18px; font-weight:700; color:#93c5fd; line-height:1;"
                                id="stat-tokens">0</div>
                            <div style="font-size:9px; color:#475569; margin-top:2px;">est. used</div>
                        </div>
                    </div>

                    <!-- Page Info Panel -->
                    <div id="page-info"
                        style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:8px 12px; margin-bottom:10px; font-size:12px; color:var(--text-secondary); display:none;">
                        <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">
                            <span id="page-favicon" style="font-size:14px;">📄</span>
                            <span id="page-domain"
                                style="color:#e2e8f0; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px;">—</span>
                        </div>
                        <div style="display:flex; gap:12px;">
                            <span>📝 <span id="page-words">—</span> words</span>
                            <span>⏱ <span id="page-read-time">—</span> min read</span>
                        </div>
                    </div>

                    <!-- Summarize Button -->
                    <button id="btn-summarize"
                        style="width:100%; padding:9px; font-size:13px; background:linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); border:none; color:white; border-radius:8px; font-weight:600; letter-spacing:0.02em; cursor:pointer; transition:all 0.2s; box-shadow:0 2px 12px rgba(99,102,241,0.3);"
                        title="Summarize current page">✨ Summarize This Page</button>
                </div>
                <div class="chat-container" id="chat-container">
                    <div class="message ai-message" id="greeting-msg">💡 Open any page and ask me about it — no need to
                        summarize first!
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="prompt" placeholder="Ask about this page..." />
                    <button id="btn-ask">Send</button>
                </div>
            </aside>
        </div>
    </div>


    <!-- Settings Modal -->
    <div id="settings-modal"
        style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div class="glass-panel" style="padding:24px; border-radius:12px; width:400px; max-width:90%;">
            <h3 style="margin-bottom:16px;">AI Settings</h3>
            <div style="margin-bottom:16px;">
                <label style="display:block; margin-bottom:8px; font-size:14px;">Gemini API Key</label>
                <input type="password" id="gemini-key-input"
                    style="width:100%; padding:8px; background:var(--input-bg); border:1px solid var(--border-color); color:var(--text-primary); border-radius:6px; outline:none;"
                    placeholder="AIzaSy...">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button id="btn-settings-cancel">Cancel</button>
                <button id="btn-settings-save"
                    style="background:var(--accent-color); color:white; border:none;">Save</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
